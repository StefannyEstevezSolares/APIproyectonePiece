<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de One Piece</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="body">

    <header class="header">

        <div class="header__container">

            <h1 class="header__logo">
                Explorador de One Piece
            </h1>

            <nav class="nav">

                <ul class="nav__list">

                    <li class="nav__item">
                        <a href="index.html" class="nav__link">
                            Inicio
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="personajes.html" class="nav__link">
                            Personajes
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <main class="main">

        <section class="home__background">

            <div class="home__content">

                <div class="home__info">

                    <img src="./img/logo.png" alt="One Piece Logo" class="main__logo">

                    <p id="main-description" class="main__description"></p>

                    <div class="home__buttons">

                        <button id="btn-prev" class="home__button">
                            Anterior
                        </button>

                        <button id="btn-next" class="home__button">
                            Siguiente
                        </button>

                    </div>

                </div>

                <img id="home-image" class="home__image" src="" alt="One Piece Character">

            </div>

        </section>

    </main>

    <script src="js/index.js"></script>

</body>
</html>
